name: MT3600BE

on:
  workflow_dispatch:
  repository_dispatch:
  watch:
    types: [started]

jobs:
  build:
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_CONFIG: MT3600BE
      WRT_THEME: argon
      WRT_NAME: MT3600BE
      WRT_SSID: MT3600BE
      WRT_WORD: 12345678
      WRT_IP: 192.168.68.1
      WRT_PW: password
      WRT_REPO: https://github.com/coolsnowwolf/lede.git
      WRT_BRANCH: master
      WRT_SOURCE: LEDE
      WRT_PACKAGE: default
      WRT_TEST: 'false'
    secrets: inherit
