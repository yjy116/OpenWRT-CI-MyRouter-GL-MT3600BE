name: MT3600BE-LEDE

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          lsb_release -a || true
          uname -a
          df -h

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo docker image prune -af || true
          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-pip \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            qemu-utils \
            ccache \
            cmake \
            ninja-build \
            libelf-dev \
            xsltproc \
            libc6-dev-i386 \
            subversion \
            patch \
            pkg-config
          df -h

      - name: Clone LEDE source
        run: |
          git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
          cd openwrt
          echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom settings and add extra packages
        run: |
          if [ ! -f Scripts/Settings.sh ]; then
            echo "Scripts/Settings.sh not found!"
            exit 1
          fi
          chmod +x Scripts/Settings.sh
          cd openwrt
          bash ../Scripts/Settings.sh

      - name: Load .config
        run: |
          if [ ! -f .config ]; then
            echo "Root .config not found!"
            exit 1
          fi
          cp .config openwrt/.config
          cd openwrt
          make defconfig
          echo "========== FILTERED .config =========="
          grep -E "CONFIG_TARGET_|CONFIG_PACKAGE_luci-app-openclash|CONFIG_PACKAGE_luci-app-homeproxy|CONFIG_PACKAGE_luci-app-mosdns|CONFIG_PACKAGE_luci-app-samba4|CONFIG_PACKAGE_luci-app-tailscale|CONFIG_PACKAGE_luci-app-zerotier" .config || true

      - name: Download sources
        run: |
          cd openwrt
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Prepare artifact files
        run: |
          mkdir -p upload
          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.itb" -o -name "*.img.gz" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.json" \) \
            -exec cp -f {} upload/ \;
          ls -lah upload || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MT3600BE-LEDE-${{ env.BUILD_DATE }}
          path: upload/
          if-no-files-found: error
