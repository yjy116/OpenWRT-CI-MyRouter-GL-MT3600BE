name: Auto-Build

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_NAME: MT3600BE-AUTO
      WRT_REPO: coolsnowwolf/lede
      WRT_BRANCH: master
      DEVICE_CONFIG: Config/MT3600BE-MINIMAL.txt
      GENERAL_CONFIG: Config/GENERAL-FULL.txt
      RELEASE_TAG: auto
      ENABLE_RELEASE: true
      ENABLE_ARTIFACT: true
    secrets: inherit
