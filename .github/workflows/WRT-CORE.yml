name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_NAME:
        required: true
        type: string
      WRT_REPO:
        required: false
        type: string
        default: coolsnowwolf/lede
      WRT_BRANCH:
        required: false
        type: string
        default: master
      WRT_COMMIT:
        required: false
        type: string
        default: 6c3097f
      WRT_CONFIG:
        required: true
        type: string
      WRT_GENERAL:
        required: false
        type: string
        default: ''
      WRT_IP:
        required: false
        type: string
        default: 192.168.8.1
      WRT_THEME:
        required: false
        type: string
        default: argon
      WRT_RELEASE:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone Asia/Shanghai
          sudo mkdir -p /mnt/build_wrt
          sudo chown -R $USER:$GROUPS /mnt/build_wrt

      - name: Clone source and lock commit
        working-directory: /mnt/build_wrt
        run: |
          git clone --depth=200 https://github.com/${{ inputs.WRT_REPO }} openwrt
          cd openwrt
          git checkout ${{ inputs.WRT_BRANCH }}
          git fetch --depth=200 origin ${{ inputs.WRT_COMMIT }} || true
          git checkout ${{ inputs.WRT_COMMIT }}
          echo "SOURCE_DATE=$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Load custom feeds and packages
        working-directory: /mnt/build_wrt/openwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/Scripts/*.sh
          $GITHUB_WORKSPACE/Scripts/Packages.sh

      - name: Update feeds
        working-directory: /mnt/build_wrt/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        working-directory: /mnt/build_wrt/openwrt
        run: |
          cp $GITHUB_WORKSPACE/${{ inputs.WRT_CONFIG }} .config
          if [ -n "${{ inputs.WRT_GENERAL }}" ] && [ -f "$GITHUB_WORKSPACE/${{ inputs.WRT_GENERAL }}" ]; then
            cat $GITHUB_WORKSPACE/${{ inputs.WRT_GENERAL }} >> .config
          fi
          export LAN_IP=${{ inputs.WRT_IP }}
          export THEME=${{ inputs.WRT_THEME }}
          $GITHUB_WORKSPACE/Scripts/Settings.sh
          make defconfig
          echo "===== .config tail ====="
          tail -n 120 .config || true

      - name: Download package
        working-directory: /mnt/build_wrt/openwrt
        run: make download -j8 V=s

      - name: Compile firmware
        working-directory: /mnt/build_wrt/openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s

      - name: Organize firmware
        id: organize
        working-directory: /mnt/build_wrt/openwrt
        run: |
          mkdir -p /mnt/build_wrt/artifacts
          find bin/targets/ -type f \( -name '*sysupgrade.bin' -o -name '*factory.bin' -o -name '*recovery.itb' -o -name '*preloader.bin' -o -name '*bl31-uboot.fip' -o -name '*manifest' -o -name '*sha256sums' \) -exec cp -f {} /mnt/build_wrt/artifacts/ \;
          ls -lah /mnt/build_wrt/artifacts
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.WRT_NAME }}-${{ env.SOURCE_DATE }}-${{ env.COMMIT_ID }}
          path: /mnt/build_wrt/artifacts/
          if-no-files-found: error

      - name: Create release
        if: ${{ inputs.WRT_RELEASE && secrets.RELEASES_TOKEN != '' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: ${{ inputs.WRT_NAME }}-${{ env.SOURCE_DATE }}-${{ env.COMMIT_ID }}
          name: ${{ inputs.WRT_NAME }}-${{ env.SOURCE_DATE }}-${{ env.COMMIT_ID }}
          files: /mnt/build_wrt/artifacts/*
          generate_release_notes: true
