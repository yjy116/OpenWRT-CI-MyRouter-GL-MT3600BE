name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_NAME:
        required: true
        type: string
      WRT_REPO:
        required: false
        type: string
        default: coolsnowwolf/lede
      WRT_BRANCH:
        required: false
        type: string
        default: master
      DEVICE_CONFIG:
        required: true
        type: string
      GENERAL_CONFIG:
        required: false
        type: string
        default: ''
      RELEASE_TAG:
        required: true
        type: string
      ENABLE_RELEASE:
        required: false
        type: boolean
        default: true
      ENABLE_ARTIFACT:
        required: false
        type: boolean
        default: true

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full \
            patch pkgconf python2.7 python3 python3-pip python3-ply python3-docutils python3-setuptools qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev file
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /mnt/build_wrt
          sudo chown "$USER":"$USER" /mnt/build_wrt

      - name: Check disk space
        run: |
          chmod +x Scripts/check_space.sh
          bash Scripts/check_space.sh

      - name: Clone source code
        working-directory: /mnt/build_wrt
        run: |
          git clone --single-branch --depth 1 -b "${{ inputs.WRT_BRANCH }}" "https://github.com/${{ inputs.WRT_REPO }}.git" lede
          cd lede
          echo "SOURCE_REPO=${{ inputs.WRT_REPO }}" >> $GITHUB_ENV
          echo "SOURCE_BRANCH=${{ inputs.WRT_BRANCH }}" >> $GITHUB_ENV
          echo "SOURCE_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Apply master auto-fix patches
        run: |
          cd /mnt/build_wrt/lede
          # Prefer the stable OpenWrt source mirror over failing snapshot mirror URLs when possible.
          sed -i 's#https://sources.cdn.openwrt.org#https://downloads.openwrt.org/sources#g' scripts/download.pl || true
          sed -i 's#https://mirror2.openwrt.org/sources#https://downloads.openwrt.org/sources#g' scripts/download.pl || true
          # Some master snapshots have stale package references that break minimal builds; disable them in config later.
          grep -n "downloads.openwrt.org/sources" scripts/download.pl || true

      - name: Load custom feeds and packages
        run: |
          cp -f Scripts/Packages.sh /mnt/build_wrt/lede/Packages.sh
          chmod +x /mnt/build_wrt/lede/Packages.sh
          cd /mnt/build_wrt/lede
          ./Packages.sh

      - name: Update feeds
        run: |
          cd /mnt/build_wrt/lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          cp -f Scripts/Settings.sh /mnt/build_wrt/lede/Settings.sh
          chmod +x /mnt/build_wrt/lede/Settings.sh
          cd /mnt/build_wrt/lede
          ./Settings.sh
          cat "$GITHUB_WORKSPACE/${{ inputs.DEVICE_CONFIG }}" > .config
          if [ -n "${{ inputs.GENERAL_CONFIG }}" ] && [ -f "$GITHUB_WORKSPACE/${{ inputs.GENERAL_CONFIG }}" ]; then
            cat "$GITHUB_WORKSPACE/${{ inputs.GENERAL_CONFIG }}" >> .config
          fi
          make defconfig
          echo "========== .config tail =========="
          tail -n 200 .config || true

      - name: Download package
        run: |
          cd /mnt/build_wrt/lede
          make download -j8 V=s || true
          find dl -size -1024c -exec ls -l {} \; || true
          find dl -size -1024c -exec rm -f {} \; || true
          # Retry serially after cleaning tiny/broken files so master snapshots have a second chance.
          make download -j1 V=s || true
          find dl -size -1024c -exec ls -l {} \; || true

      - name: Compile the firmware
        id: compile
        run: |
          cd /mnt/build_wrt/lede
          echo "BUILD_START=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

          (
            while true; do
              echo "[keepalive] $(date '+%F %T') compiling..."
              sleep 60
            done
          ) &
          KEEPALIVE_PID=$!

          make -j4 V=s
          BUILD_RET=$?

          kill $KEEPALIVE_PID || true

          echo "BUILD_END=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          exit $BUILD_RET

      - name: Dump error context on failure
        if: failure()
        run: |
          cd /mnt/build_wrt/lede
          echo "========== .config tail =========="
          tail -n 200 .config || true
          echo "========== recent logs =========="
          find build_dir -type f \( -name "*.log" -o -name "*.txt" \) | tail -n 20 | xargs -r -I{} sh -c 'echo "----- {} -----"; tail -n 80 "{}" || true'
          echo "========== package download leftovers =========="
          find dl -size -1024c -exec ls -l {} \; || true

      - name: Organize firmware files
        if: steps.compile.conclusion == 'success'
        run: |
          cd /mnt/build_wrt/lede/bin/targets/*/*
          mkdir -p $GITHUB_WORKSPACE/output
          find . -maxdepth 1 -type f \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.manifest" -o -name "*.buildinfo" -o -name "*.sha256sums" \) -exec cp -f {} $GITHUB_WORKSPACE/output/ \;
          cp -f profiles.json $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          echo "FIRMWARE_DIR=$GITHUB_WORKSPACE/output" >> $GITHUB_ENV

      - name: Upload artifact
        if: steps.compile.conclusion == 'success' && inputs.ENABLE_ARTIFACT
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.WRT_NAME }}-${{ env.SOURCE_COMMIT }}
          path: output/
          if-no-files-found: error

      - name: Generate release information
        if: steps.compile.conclusion == 'success' && inputs.ENABLE_RELEASE
        run: |
          cat > release.txt <<REL
          Device: ${{ inputs.WRT_NAME }}
          Source: ${{ env.SOURCE_REPO }}
          Branch: ${{ env.SOURCE_BRANCH }}
          Commit: ${{ env.SOURCE_COMMIT }}
          Build Start: ${{ env.BUILD_START }}
          Build End: ${{ env.BUILD_END }}
          REL

      - name: Upload firmware to release
        if: steps.compile.conclusion == 'success' && inputs.ENABLE_RELEASE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.RELEASE_TAG }}-${{ env.SOURCE_COMMIT }}
          body_path: release.txt
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
